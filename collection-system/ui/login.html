<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 贷后催收系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-hand-holding-usd"></i>
                    <span>贷后催收系统</span>
                </div>
                <h2>用户登录</h2>
                <p>请输入您的用户名和密码</p>
            </div>
            
            <div class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="label-wrapper">
                        <label for="password">密码</label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="请输入密码">
                        <button class="toggle-password" type="button" id="togglePasswordBtn">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        记住我
                    </label>
                </div>
                
                <div class="form-actions">
                    <button class="btn btn-primary btn-block" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        登录
                    </button>
                </div>
            </div>
        </div>
        
        <div class="login-footer">
            <p>© 2026 贷后催收系统. 保留所有权利.</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // 直接在登录页面初始化登录功能
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const loginBtn = document.getElementById('loginBtn');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const rememberCheckbox = document.getElementById('remember');
            
            console.log('[DEBUG] DOM元素:', {
                loginBtn: !!loginBtn,
                togglePasswordBtn: !!togglePasswordBtn,
                usernameInput: !!usernameInput,
                passwordInput: !!passwordInput,
                rememberCheckbox: !!rememberCheckbox
            });
            
            if (loginBtn) {
                // 绑定登录按钮事件
                loginBtn.addEventListener('click', handleLogin);
                console.log('[DEBUG] 登录按钮事件已绑定');
                
                // 绑定回车键登录
                document.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        console.log('[DEBUG] 回车键登录');
                        handleLogin();
                    }
                });
            }
            
            if (togglePasswordBtn) {
                // 绑定密码显示/隐藏切换
                togglePasswordBtn.addEventListener('click', togglePassword);
                console.log('[DEBUG] 密码切换按钮事件已绑定');
            }
            
            // 检查是否有记住的用户
            checkRememberedUser();
        });
    </script>
</body>
</html>
